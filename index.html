<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Responsive viewport for Pi touchscreens -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a3a5c">
    <meta name="description" content="A living, emotionally intelligent aquarium dashboard for Hermes agent">

    <title>Hermes Aquarium Dashboard</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="css/aquarium.css">

    <!-- Apple PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hermes Aquarium">
</head>
<body>
    <!--
      Hermes Aquarium Dashboard — V3: Full Enhancement Suite
      A living canvas with limbic integration, generative audio, touch gestures,
      weather sync, neurochemical HUD, and capture/export.
    -->

    <!-- Main canvas fills the entire viewport -->
    <canvas id="aquariumCanvas"></canvas>

    <!-- Status overlay (shows state + affect + mood variant) -->
    <div id="statusOverlay" class="hidden" role="status" aria-live="polite" aria-atomic="true">
        <span id="statusText">idle</span>
    </div>

    <!-- E-ink mode toggle -->
    <button id="einkToggle" title="Toggle e-Ink mode" aria-label="Toggle e-Ink display mode">⬛</button>

    <!-- HUD toggle -->
    <button id="hudToggle" title="Toggle Neurochemical HUD (H)" aria-label="Toggle neurochemical HUD overlay">🧠</button>

    <!-- Audio toggle -->
    <button id="audioToggle" title="Toggle Audio (M)" aria-label="Toggle ambient audio">🔊</button>

    <!-- Weather indicator -->
    <div id="weatherIndicator" title="Local weather" aria-label="Current weather">
        <span id="weatherIcon">🌤️</span>
        <span id="weatherTemp">--°</span>
    </div>

    <!-- Capture button -->
    <button id="captureBtn" title="Capture 5s video (C)" aria-label="Record aquarium animation">📷</button>

    <!-- Debug info panel -->
    <div id="debugPanel" role="region" aria-label="Debug information">
        <span id="profileName">auto</span> |
        <span id="fpsCounter">--</span> fps
        <span id="limbicIndicator"></span>
        <span id="cacheIndicator"></span>
    </div>

    <!-- Screen reader announcer (hidden) -->
    <div id="sr-announcer" aria-live="polite" aria-atomic="true" style="position:absolute;left:-10000px;width:1px;height:1px;overflow:hidden;"></div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/state-manager.js"></script>
    <script src="js/limbic-bridge.js"></script>
    <script src="js/image-manager.js"></script>
    <script src="js/audio-engine.js"></script>
    <script src="js/touch-engine.js"></script>
    <script src="js/hud-overlay.js"></script>
    <script src="js/weather-sync.js"></script>
    <script src="js/capture-module.js"></script>
    <script src="js/environment.js"></script>
    <script src="js/angelfish.js"></script>
    <script src="js/aquarium.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('SW registered:', reg.scope);
                    // Listen for updates
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('New version available');
                                // Optional: auto-reload or show notification
                            }
                        });
                    });
                })
                .catch(err => console.error('SW registration failed:', err));
        }
    </script>
</body>
</html>
